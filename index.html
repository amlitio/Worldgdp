<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Economy 2026 | Fixed 3D Globe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #050508; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #ui { position: absolute; top: 30px; left: 30px; pointer-events: none; z-index: 10; }
        .stats { font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        
        #search-container {
            position: absolute; top: 30px; right: 30px;
            background: rgba(255,255,255,0.07); padding: 10px 20px;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(15px); z-index: 100; display: flex; align-items: center;
        }
        #search-input {
            background: none; border: none; color: white; outline: none; width: 150px; margin-left: 10px;
        }

        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15,15,20,0.9); padding: 15px 40px; border-radius: 50px;
            border: 1px solid #333; backdrop-filter: blur(15px); display: flex; align-items: center; gap: 25px;
        }
        input[type=range] { cursor: pointer; accent-color: var(--accent); width: 220px; }
        #year-display { font-weight: 900; color: var(--accent); font-size: 1.2rem; }

        #tooltip { 
            position: absolute; background: rgba(0,0,0,0.9); padding: 15px; 
            border-radius: 12px; border: 1px solid var(--accent); display: none; 
            pointer-events: none; font-size: 14px; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div style="color: #666; font-size: 0.8rem; letter-spacing: 2px;">GLOBAL PPP GDP 2026</div>
        <div class="stats">$219.2T</div>
        <div style="color: var(--accent); font-weight: bold; margin-top: 5px;">● SYSTEM ONLINE: SPHERICAL MAP</div>
    </div>

    <div id="search-container">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="Search Country...">
    </div>

    <div id="controls">
        <span style="font-size: 0.7rem; color: #555;">2024</span>
        <input type="range" id="time-slider" min="2024" max="2026" step="0.01" value="2026">
        <div id="year-display">2026</div>
    </div>

    <div id="tooltip"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. DATA
        const economyData = [
            { name: "China", gdp: 43.5, lat: 35.8, lng: 104.1, color: "#ff3e3e" },
            { name: "USA", gdp: 31.8, lat: 37.0, lng: -95.7, color: "#3e70ff" },
            { name: "India", gdp: 19.1, lat: 20.5, lng: 78.9, color: "#ff9f3e" },
            { name: "Russia", gdp: 7.3, lat: 61.5, lng: 105.3, color: "#888888" },
            { name: "Japan", gdp: 6.9, lat: 36.2, lng: 138.2, color: "#ff5e5e" },
            { name: "Germany", gdp: 6.3, lat: 51.1, lng: 10.4, color: "#ffcc00" },
            { name: "Indonesia", gdp: 5.4, lat: -0.7, lng: 113.9, color: "#ff4e4e" },
            { name: "Brazil", gdp: 5.2, lat: -14.2, lng: -51.9, color: "#00c853" },
            { name: "UK", gdp: 4.6, lat: 55.3, lng: -3.4, color: "#4e7eff" },
            { name: "France", gdp: 4.7, lat: 46.2, lng: 2.2, color: "#4e7eff" }
        ];

        // 2. SCENE
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        camera.position.set(0, 0, 150);

        // 3. THE GLOBE WITH TEXTURE
        const radius = 50;
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        const loader = new THREE.TextureLoader();
        // Using a high-contrast map to see continents in a dark theme
        const earthMap = loader.load('https://unpkg.com/three-globe/example/img/earth-dark.jpg');

        const globe = new THREE.Mesh(
            new THREE.SphereGeometry(radius, 64, 64),
            new THREE.MeshStandardMaterial({ 
                map: earthMap,
                color: 0x222222,
                emissive: 0x111111,
                roughness: 0.8,
                metalness: 0.2
            })
        );
        globeGroup.add(globe);

        // Grid/Atmosphere
        const grid = new THREE.Mesh(
            new THREE.SphereGeometry(radius + 0.5, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true, transparent: true, opacity: 0.05 })
        );
        globeGroup.add(grid);

        // 4. DATA TOWERS (Fixing clickability)
        const barGroup = new THREE.Group();
        globeGroup.add(barGroup);
        const bars = [];

        economyData.forEach(data => {
            const h = data.gdp * 0.8;
            const geo = new THREE.BoxGeometry(2, 2, h);
            geo.translate(0, 0, h / 2);
            
            const mat = new THREE.MeshStandardMaterial({ 
                color: data.color, emissive: data.color, emissiveIntensity: 0.5 
            });
            const bar = new THREE.Mesh(geo, mat);

            const phi = (90 - data.lat) * (Math.PI / 180);
            const theta = (data.lng + 180) * (Math.PI / 180);

            bar.position.set(
                -(radius) * Math.sin(phi) * Math.cos(theta),
                (radius) * Math.cos(phi),
                (radius) * Math.sin(phi) * Math.sin(theta)
            );

            bar.lookAt(0, 0, 0);
            bar.userData = data;
            barGroup.add(bar);
            bars.push(bar);
        });

        // 5. CLICK & TOOLTIP LOGIC
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(barGroup.children);
            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                focusOn(data.name);
            }
        });

        // Search + Fly To
        function focusOn(name) {
            const b = bars.find(x => x.userData.name.toLowerCase() === name.toLowerCase());
            if (b) {
                const p = b.position.clone().applyMatrix4(globeGroup.matrixWorld);
                const camTarget = p.clone().normalize().multiplyScalar(140);
                
                gsap.to(camera.position, { x: camTarget.x, y: camTarget.y, z: camTarget.z, duration: 1.5, ease: "power2.inOut" });
                gsap.to(controls.target, { x: p.x, y: p.y, z: p.z, duration: 1.5 });
                
                tooltip.style.display = 'block';
                tooltip.style.left = '50%';
                tooltip.style.top = '20%';
                tooltip.style.transform = 'translateX(-50%)';
                tooltip.innerHTML = `<strong>${b.userData.name}</strong><br>GDP: $${b.userData.gdp}T (PPP)`;
            }
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') focusOn(e.target.value);
        });

        // Time Slider
        document.getElementById('time-slider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('year-display').innerText = Math.floor(val);
            const s = 0.8 + ((val - 2024) / 2) * 0.2;
            barGroup.children.forEach(b => b.scale.set(1, 1, s));
        });

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(100, 100, 100);
        scene.add(light);

        function animate() {
            requestAnimationFrame(animate);
            globeGroup.rotation.y += 0.001; 
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
