<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Economy 2026 | Pro 3D Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #020205; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 30px; left: 30px; pointer-events: none; z-index: 10; }
        .stats { font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        #search-container {
            position: absolute; top: 30px; right: 30px; background: rgba(255,255,255,0.05); 
            padding: 10px 20px; border-radius: 30px; border: 1px solid var(--accent); 
            backdrop-filter: blur(15px); z-index: 100;
        }
        #search-input { background: none; border: none; color: white; outline: none; width: 150px; }
        #controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(10,10,15,0.9); padding: 15px 40px; border-radius: 50px;
            border: 1px solid #333; display: flex; align-items: center; gap: 20px; z-index: 100;
        }
        input[type=range] { cursor: pointer; accent-color: var(--accent); width: 200px; }
        #tooltip { 
            position: absolute; background: rgba(0,0,0,0.95); padding: 12px; border-radius: 8px; 
            border: 1px solid var(--accent); display: none; pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div style="color: #666; font-size: 0.8rem; letter-spacing: 2px; font-weight: bold;">WORLD PPP GDP 2026</div>
        <div class="stats" id="main-gdp">$219.2T</div>
        <div style="color: var(--accent); font-weight: bold; font-size: 0.8rem; margin-top: 5px;">● SYSTEM ONLINE: VERCEL OPTIMIZED</div>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search Country...">
    </div>

    <div id="controls">
        <span style="font-size: 0.7rem; color: #555;">2024</span>
        <input type="range" id="time-slider" min="2024" max="2026" step="0.01" value="2026">
        <div id="year-display" style="color: var(--accent); font-weight: 900;">2026</div>
    </div>

    <div id="tooltip"></div>

    <script type="module">
        // --- 1. DATA & CONFIG ---
        const economyData = [
            { name: "China", gdp: 43.5, lat: 35.8, lng: 104.1, color: "#ff3e3e" },
            { name: "USA", gdp: 31.8, lat: 37.0, lng: -95.7, color: "#3e70ff" },
            { name: "India", gdp: 19.1, lat: 20.5, lng: 78.9, color: "#ff9f3e" },
            { name: "Russia", gdp: 7.3, lat: 61.5, lng: 105.3, color: "#ffffff" },
            { name: "Japan", gdp: 6.9, lat: 36.2, lng: 138.2, color: "#ff5e5e" },
            { name: "Germany", gdp: 6.3, lat: 51.1, lng: 10.4, color: "#ffcc00" },
            { name: "Brazil", gdp: 5.2, lat: -14.2, lng: -51.9, color: "#00c853" },
            { name: "UK", gdp: 4.6, lat: 55.3, lng: -3.4, color: "#4e7eff" }
        ];

        // --- 2. SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        camera.position.set(0, 0, 180);

        // --- 3. STARS & BACKGROUND ---
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<8000; i++) {
            starCoords.push((Math.random()-0.5)*1500, (Math.random()-0.5)*1500, (Math.random()-0.5)*1500);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 })));

        // --- 4. THE GLOBE (Landmass Dots) ---
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        const radius = 50;
        // Base dark sphere
        const baseSphere = new THREE.Mesh(
            new THREE.SphereGeometry(radius - 0.2, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x050508 })
        );
        globeGroup.add(baseSphere);

        // Procedural Continents (Dotted Map)
        const dotMat = new THREE.MeshBasicMaterial({ color: 0x333344 });
        const dotGeo = new THREE.CircleGeometry(0.5, 5);

        const addContinent = (latMin, latMax, lngMin, lngMax) => {
            for(let i=0; i<400; i++) {
                const lat = latMin + Math.random() * (latMax - latMin);
                const lng = lngMin + Math.random() * (lngMax - lngMin);
                const dot = new THREE.Mesh(dotGeo, dotMat);
                const phi = (90 - lat) * (Math.PI / 180);
                const theta = (lng + 180) * (Math.PI / 180);
                dot.position.set(-radius * Math.sin(phi) * Math.cos(theta), radius * Math.cos(phi), radius * Math.sin(phi) * Math.sin(theta));
                dot.lookAt(0,0,0);
                globeGroup.add(dot);
            }
        };

        addContinent(20, 70, -120, -70); // North America
        addContinent(-50, 10, -80, -40); // South America
        addContinent(30, 75, -10, 140);  // Eurasia
        addContinent(-35, 35, -15, 50);  // Africa
        addContinent(-40, -10, 110, 150); // Australia

        // --- 5. GDP BARS & INTERACTION ---
        const bars = [];
        economyData.forEach(d => {
            const h = d.gdp * 1.0;
            const geo = new THREE.BoxGeometry(3, 3, h);
            geo.translate(0, 0, h / 2);
            const mat = new THREE.MeshStandardMaterial({ color: d.color, emissive: d.color, emissiveIntensity: 1 });
            const mesh = new THREE.Mesh(geo, mat);

            const phi = (90 - d.lat) * (Math.PI / 180);
            const theta = (d.lng + 180) * (Math.PI / 180);
            mesh.position.set(-radius * Math.sin(phi) * Math.cos(theta), radius * Math.cos(phi), radius * Math.sin(phi) * Math.sin(theta));
            mesh.lookAt(0,0,0);
            mesh.userData = d;
            globeGroup.add(mesh);
            bars.push(mesh);
        });

        // Click Handler
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bars);

            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 'px'; tooltip.style.top = e.clientY + 'px';
                tooltip.innerHTML = `<strong>${data.name}</strong><br>GDP: $${data.gdp}T`;
                
                const pos = intersects[0].object.position.clone().applyMatrix4(globeGroup.matrixWorld).normalize().multiplyScalar(160);
                gsap.to(camera.position, { x: pos.x, y: pos.y, z: pos.z, duration: 1.5, ease: "power2.inOut" });
            } else { tooltip.style.display = 'none'; }
        });

        // Search Logic
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const found = bars.find(b => b.userData.name.toLowerCase() === e.target.value.toLowerCase());
                if(found) {
                    const pos = found.position.clone().applyMatrix4(globeGroup.matrixWorld).normalize().multiplyScalar(160);
                    gsap.to(camera.position, { x: pos.x, y: pos.y, z: pos.z, duration: 1.5 });
                }
            }
        });

        // --- 6. LIGHTS & ANIMATION ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dl = new THREE.DirectionalLight(0xffffff, 1); dl.position.set(1, 1, 1); scene.add(dl);

        function animate() {
            requestAnimationFrame(animate);
            globeGroup.rotation.y += 0.001; // Continuous spin
            renderer.render(scene, camera);
        }
        animate();

        // Responsive Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Time Slider
        document.getElementById('time-slider').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            document.getElementById('year-display').innerText = Math.floor(val);
            const scale = 0.8 + ((val - 2024) / 2) * 0.2;
            bars.forEach(b => b.scale.set(1, 1, scale));
        });
    </script>
</body>
</html>
