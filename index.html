<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Economy 2026 | Digital Sphere</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #030305; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        #ui { position: absolute; top: 30px; left: 30px; pointer-events: none; z-index: 10; }
        .stats { font-size: 3rem; font-weight: 900; margin: 0; letter-spacing: -2px; }
        
        #search-container {
            position: absolute; top: 30px; right: 30px;
            background: rgba(255,255,255,0.05); padding: 10px 20px;
            border-radius: 30px; border: 1px solid var(--accent);
            backdrop-filter: blur(10px); z-index: 100;
        }
        #search-input { background: none; border: none; color: white; outline: none; width: 140px; font-size: 14px; }

        #controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(10,10,15,0.9); padding: 15px 40px; border-radius: 50px;
            border: 1px solid #333; display: flex; align-items: center; gap: 20px; z-index: 100;
        }
        input[type=range] { cursor: pointer; accent-color: var(--accent); width: 180px; }
        #year-display { font-weight: 900; color: var(--accent); font-size: 1.2rem; min-width: 50px; }

        #tooltip { 
            position: absolute; background: rgba(0,0,0,0.9); padding: 12px; border: 1px solid var(--accent);
            display: none; pointer-events: none; border-radius: 8px; z-index: 1000; font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div style="color: #666; font-size: 0.7rem; letter-spacing: 2px; font-weight: 700;">WORLD PPP GDP 2026</div>
        <div class="stats">$219.2T</div>
        <div style="color: var(--accent); font-weight: bold; font-size: 0.8rem; margin-top: 5px;">● SPHERICAL ENGINE FINAL</div>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search Country...">
    </div>

    <div id="controls">
        <span style="font-size: 0.7rem; color: #555; font-weight: bold;">2024</span>
        <input type="range" id="time-slider" min="2024" max="2026" step="0.01" value="2026">
        <div id="year-display">2026</div>
    </div>

    <div id="tooltip"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. DATA (2026 Forecasts)
        const economyData = [
            { name: "China", gdp: 43.5, lat: 35.8, lng: 104.1, color: "#ff3e3e" },
            { name: "USA", gdp: 31.8, lat: 37.0, lng: -95.7, color: "#3e70ff" },
            { name: "India", gdp: 19.1, lat: 20.5, lng: 78.9, color: "#ff9f3e" },
            { name: "Russia", gdp: 7.3, lat: 61.5, lng: 105.3, color: "#ffffff" },
            { name: "Japan", gdp: 6.9, lat: 36.2, lng: 138.2, color: "#ff5e5e" },
            { name: "Germany", gdp: 6.3, lat: 51.1, lng: 10.4, color: "#ffcc00" },
            { name: "Indonesia", gdp: 5.4, lat: -0.7, lng: 113.9, color: "#ff4e4e" },
            { name: "Brazil", gdp: 5.2, lat: -14.2, lng: -51.9, color: "#00c853" },
            { name: "UK", gdp: 4.6, lat: 55.3, lng: -3.4, color: "#4e7eff" },
            { name: "France", gdp: 4.7, lat: 46.2, lng: 2.2, color: "#4e7eff" }
        ];

        // 2. SCENE SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        camera.position.set(0, 0, 160);

        // Starfield
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<6000; i++) starPos.push((Math.random()-0.5)*1200, (Math.random()-0.5)*1200, (Math.random()-0.5)*1200);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x888888, size: 0.8})));

        // 3. THE GLOBE
        const radius = 50;
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // Dark Base Sphere
        const base = new THREE.Mesh(
            new THREE.SphereGeometry(radius - 0.5, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x050508 })
        );
        globeGroup.add(base);

        // Dot Landmasses (Geometric Approximation)
        const dotGeo = new THREE.CircleGeometry(0.4, 5);
        const dotMat = new THREE.MeshBasicMaterial({ color: 0x222233, side: THREE.DoubleSide });
        
        function addLand(latStart, latEnd, lngStart, lngEnd, density = 0.5) {
            for(let lat=latStart; lat<latEnd; lat+=2) {
                for(let lng=lngStart; lng<lngEnd; lng+=2) {
                    if(Math.random() > density) continue;
                    const dot = new THREE.Mesh(dotGeo, dotMat);
                    const phi = (90 - lat) * (Math.PI / 180);
                    const theta = (lng + 180) * (Math.PI / 180);
                    dot.position.set(-radius * Math.sin(phi) * Math.cos(theta), radius * Math.cos(phi), radius * Math.sin(phi) * Math.sin(theta));
                    dot.lookAt(0,0,0);
                    globeGroup.add(dot);
                }
            }
        }
        // Simplified Continent Clusters
        addLand(15, 70, -130, -60, 0.2); // N America
        addLand(-50, 12, -80, -35, 0.3); // S America
        addLand(35, 70, -10, 150, 0.2);  // Eurasia
        addLand(-35, 35, -20, 50, 0.3);  // Africa
        addLand(-40, -10, 110, 150, 0.4); // Australia

        // 4. DATA BARS
        const barMeshes = [];
        economyData.forEach(d => {
            const h = d.gdp * 0.9;
            const geo = new THREE.BoxGeometry(2.5, 2.5, h);
            geo.translate(0, 0, h / 2);
            const mat = new THREE.MeshStandardMaterial({ color: d.color, emissive: d.color, emissiveIntensity: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);

            const phi = (90 - d.lat) * (Math.PI / 180);
            const theta = (d.lng + 180) * (Math.PI / 180);
            mesh.position.set(-radius * Math.sin(phi) * Math.cos(theta), radius * Math.cos(phi), radius * Math.sin(phi) * Math.sin(theta));
            mesh.lookAt(0, 0, 0);
            mesh.userData = d;
            globeGroup.add(mesh);
            barMeshes.push(mesh);
        });

        // 5. INTERACTION
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(barMeshes);
            if (hits.length > 0) {
                const d = hits[0].object.userData;
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 15 + 'px'; tooltip.style.top = e.clientY + 'px';
                tooltip.innerHTML = `<strong>${d.name}</strong><br>Forecasted GDP: $${d.gdp}T`;
                
                const p = hits[0].object.position.clone().applyMatrix4(globeGroup.matrixWorld);
                const target = p.clone().normalize().multiplyScalar(150);
                gsap.to(camera.position, { x: target.x, y: target.y, z: target.z, duration: 1.5, ease: "power2.inOut" });
            } else { tooltip.style.display = 'none'; }
        });

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const b = barMeshes.find(m => m.userData.name.toLowerCase() === e.target.value.toLowerCase());
                if(b) {
                    const p = b.position.clone().applyMatrix4(globeGroup.matrixWorld);
                    const target = p.clone().normalize().multiplyScalar(150);
                    gsap.to(camera.position, { x: target.x, y: target.y, z: target.z, duration: 1.5 });
                }
            }
        });

        // 6. ANIMATION & SLIDER
        document.getElementById('time-slider').addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            document.getElementById('year-display').innerText = Math.floor(v);
            const scale = 0.75 + (v - 2024)/2 * 0.25;
            barMeshes.forEach(m => m.scale.set(1, 1, scale));
        });

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dl = new THREE.DirectionalLight(0xffffff, 1.2); dl.position.set(100, 100, 100); scene.add(dl);

        function animate() {
            requestAnimationFrame(animate);
            globeGroup.rotation.y += 0.0012; // Continuous rotation
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
