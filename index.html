<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Economy 2026 | Ultimate Edition</title>
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/three-globe"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #020205; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #ui { position: absolute; top: 30px; left: 30px; pointer-events: none; z-index: 10; }
        .stats { font-size: 3.5rem; font-weight: 900; margin: 0; letter-spacing: -3px; }
        
        #search-container {
            position: absolute; top: 30px; right: 30px;
            background: rgba(255,255,255,0.05); padding: 12px 20px;
            border-radius: 40px; border: 1px solid var(--accent);
            backdrop-filter: blur(20px); z-index: 100;
        }
        #search-input { background: none; border: none; color: white; outline: none; width: 160px; font-size: 14px; }

        #controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(10,10,15,0.9); padding: 18px 45px; border-radius: 60px;
            border: 1px solid #333; display: flex; align-items: center; gap: 25px; z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        input[type=range] { cursor: pointer; accent-color: var(--accent); width: 200px; }
        #year-display { font-weight: 900; color: var(--accent); font-size: 1.4rem; min-width: 60px; }

        #tooltip { 
            position: absolute; background: rgba(0,0,0,0.95); padding: 15px; border: 1px solid var(--accent);
            display: none; pointer-events: none; border-radius: 12px; z-index: 1000;
            box-shadow: 0 0 30px rgba(0,255,136,0.2);
        }
    </style>
</head>
<body>

    <div id="ui">
        <div style="color: #555; font-size: 0.8rem; letter-spacing: 4px; font-weight: 900; text-transform: uppercase;">World PPP GDP Projection</div>
        <div class="stats">$219.2T</div>
        <div style="color: var(--accent); font-weight: bold; font-size: 0.9rem; margin-top: 8px; display: flex; align-items: center;">
            <span style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 10px; animation: pulse 1.5s infinite;"></span>
            SYSTEM ONLINE: GLOBAL 2026 ENGINE
        </div>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search a Country...">
    </div>

    <div id="controls">
        <span style="font-size: 0.8rem; color: #666; font-weight: 900;">2024</span>
        <input type="range" id="time-slider" min="2024" max="2026" step="0.01" value="2026">
        <div id="year-display">2026</div>
    </div>

    <div id="tooltip"></div>

    <script type="module">
        import { OrbitControls } from 'https://unpkg.com/three/examples/jsm/controls/OrbitControls.js';

        // 1. DATA (Official 2026 Forecasts)
        const gdpData = [
            { name: "China", gdp: 43.5, lat: 35.8, lng: 104.1, color: "#ff4b2b" },
            { name: "USA", gdp: 31.8, lat: 37.0, lng: -95.7, color: "#0052d4" },
            { name: "India", gdp: 19.1, lat: 20.5, lng: 78.9, color: "#f7971e" },
            { name: "Russia", gdp: 7.3, lat: 61.5, lng: 105.3, color: "#8e9eab" },
            { name: "Japan", gdp: 6.9, lat: 36.2, lng: 138.2, color: "#e53935" },
            { name: "Germany", gdp: 6.3, lat: 51.1, lng: 10.4, color: "#f8ff00" },
            { name: "Indonesia", gdp: 5.4, lat: -0.7, lng: 113.9, color: "#ff416c" },
            { name: "Brazil", gdp: 5.2, lat: -14.2, lng: -51.9, color: "#11998e" },
            { name: "UK", gdp: 4.6, lat: 55.3, lng: -3.4, color: "#1e3c72" },
            { name: "France", gdp: 4.7, lat: 46.2, lng: 2.2, color: "#2a5298" }
        ];

        // 2. SETUP WORLD
        const Globe = new ThreeGlobe()
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .atmosphereColor('#00ff88')
            .atmosphereAltitude(0.15)
            .pointsData(gdpData)
            .pointAltitude(d => d.gdp / 100)
            .pointColor('color')
            .pointRadius(1.2)
            .pointsTransitionDuration(1000);

        // 3. THREE.JS BOILERPLATE
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.add(Globe);
        scene.add(new THREE.AmbientLight(0xbbbbbb, 0.3));
        
        const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dLight.position.set(-1, 1, 1);
        scene.add(dLight);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 300;

        const tbControls = new OrbitControls(camera, renderer.domElement);
        tbControls.enableDamping = true;
        tbControls.dampingFactor = 0.05;
        tbControls.rotateSpeed = 0.8;
        tbControls.autoRotate = true;
        tbControls.autoRotateSpeed = 0.5;

        // 4. INTERACTIVITY
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('click', event => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Globe.children, true);

            if (intersects.length > 0) {
                const data = intersects[0].object.__data;
                if (data) focusOnCountry(data);
            }
        });

        function focusOnCountry(data) {
            const mapPos = Globe.getCoords(data.lat, data.lng, 1.2);
            gsap.to(camera.position, {
                x: mapPos.x * 2.5,
                y: mapPos.y * 2.5,
                z: mapPos.z * 2.5,
                duration: 2,
                ease: "expo.out"
            });
            tbControls.autoRotate = false;
            
            tooltip.style.display = 'block';
            tooltip.style.left = '50%';
            tooltip.style.top = '15%';
            tooltip.style.transform = 'translateX(-50%)';
            tooltip.innerHTML = `<div style="color:${data.color}; font-weight:900; font-size:1.2rem;">${data.name}</div><div style="font-size:0.8rem; opacity:0.7; margin-top:5px;">Estimated GDP 2026</div><div style="font-size:1.5rem; font-weight:900;">$${data.gdp}T</div>`;
        }

        // Search Input
        document.getElementById('search-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const country = gdpData.find(d => d.name.toLowerCase() === e.target.value.toLowerCase());
                if (country) focusOnCountry(country);
            }
        });

        // Time Slider
        document.getElementById('time-slider').addEventListener('input', e => {
            const val = parseFloat(e.target.value);
            document.getElementById('year-display').innerText = Math.floor(val);
            const scale = 0.8 + ((val - 2024) / 2) * 0.2;
            Globe.pointAltitude(d => (d.gdp / 100) * scale);
        });

        // 5. ANIMATION LOOP
        (function animate() {
            tbControls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        })();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>

    <style>
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</body>
</html>
